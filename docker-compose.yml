services:
  # Nuxt en modo desarrollo.
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: gamesvue-frontend
    ports:
      # Web disponible en localhost:3000.
      - "3000:3000"
    volumes:
      # Monta el codigo para ver cambios al momento.
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

  # API PHP con Apache.
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: gamesvue-api
    ports:
      # API disponible en localhost:8080.
      - "8080:80"
    volumes:
      # Monta el codigo PHP dentro de Apache.
      - ./api:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: gamesvue
      DB_USER: gamesvue_user
      DB_PASSWORD: gamesvue_password
    depends_on:
      - db

  # Base de datos MySQL.
  db:
    image: mysql:8.4
    container_name: gamesvue-db
    ports:
      # MySQL local para herramientas externas.
      - "3306:3306"
    environment:
      MYSQL_DATABASE: gamesvue
      MYSQL_USER: gamesvue_user
      MYSQL_PASSWORD: gamesvue_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      # Persistencia y scripts iniciales.
      - db_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d

  # Panel visual para revisar MySQL.
  phpmyadmin:
    image: phpmyadmin:5
    container_name: gamesvue-phpmyadmin
    ports:
      # phpMyAdmin en localhost:8081.
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  # Evita reinstalar dependencias del frontend.
  frontend_node_modules:
  # Conserva datos de MySQL.
  db_data:
